name: Build & Release

on:
  push:
    branches:
      - ci-test
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf \
            make \
            tar

      - name: Build binaries
        run: |
          make clean

          # AMD64
          make release VERSION=${VERSION} CC=gcc
          cp dist/lord lord-linux-amd64

          # ARM64
          make clean
          make release VERSION=${VERSION} CC=aarch64-linux-gnu-gcc
          cp dist/lord lord-linux-arm64

          # ARMv7
          make clean
          make release VERSION=${VERSION} CC=arm-linux-gnueabihf-gcc
          cp dist/lord lord-linux-armv7
     

      - name: Package tar.gz binaries
        run: |
          mkdir dist-pack

          package () {
            ARCH=$1
            BIN=$2

            mkdir -p pkg/lord-${VERSION}
            cp ${BIN} pkg/lord-${VERSION}/lord
            cp README.md pkg/lord-${VERSION}/
            [ -f LICENSE ] && cp LICENSE pkg/lord-${VERSION}/

            tar -czf dist-pack/lord-${ARCH}.tar.gz -C pkg lord-${VERSION}
            tar -czf dist-pack/lord-${VERSION}-${ARCH}.tar.gz -C pkg lord-${VERSION}
            rm -rf pkg
          }

          package linux-amd64 lord-linux-amd64
          package linux-arm64 lord-linux-arm64
          package linux-armv7 lord-linux-armv7
          
      - name: Package docs
        run: |
          if [ -d docs ]; then
            tar -czf dist-pack/lord-${VERSION}-docs.tar.gz docs
          else
            echo "No docs/ directory, skipping..."
          fi


      - name: Upload artifacts (test mode)
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: lord-builds
          path: dist-pack/

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          files: dist-pack/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
